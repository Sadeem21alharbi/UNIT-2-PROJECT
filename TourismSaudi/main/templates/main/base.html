{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <title>{% block title %}Discover Saudi{% endblock %}</title>
</head>
<body>
    <nav class="navbar">
        <div class ="nav-container">
            <div class="nav-left">
                <img class="logo" src="{% static 'images/Saudi-logo-rm.png' %}">
            </div>
            <div class="nav-right">
                <a href="{% url 'main:home_view' %}" class="translate-text" data-ar="الرئيسية" data-en="Home">Home</a>
                <a href="#contact" class="translate-text" data-ar="تواصل معنا" data-en="Contact">Contact</a>
                <a href="#" class="translate-text" data-ar="سجل دخول" data-en="Log in">Log in</a>
            </div>
    </nav>

    {% block content %}{% endblock %}

    <section id="contact">
        <div class="contact-container">
            <h1 class="translate-text" data-ar="تواصل معي" data-en="Contact Me">Contact Me</h1>
            <p class="translate-text" data-ar="دعنا نعمل معاً 👇" data-en="Let’s work together 👇">Let’s work together 👇</p>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="4" placeholder="Your Message" required></textarea>
                <button type="submit" class="translate-text" data-ar="إرسال" data-en="Send Message">Send Message</button>
            </form>
            <div class="contact-info">
                <p>Email: sadeem@email.com</p>
                <p>GitHub: github.com/sadeem21alharbi</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="lang-switcher">
            <button onclick="changeLanguage('ar')">العربية</button>
            <button onclick="changeLanguage('en')">English</button>
        </div>
        <div class="accessibility-controls">
        <button onclick="changeFontSize('increase')" title="A+">A+</button>
        <button onclick="changeFontSize('decrease')" title="A-">A-</button>
        
        <button id="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> </button>
        </div>
        <p>&copy; 2026 Let's Discover Saudi. All rights reserved.</p>
    </footer>

        <script>
    // --- أولاً: وظائف الكوكيز (يجب أن تكون موجودة ليشتغل الكود) ---
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            let date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    // --- ثانياً: التحكم في حجم الخط ---
    // أضفنا let هنا لتعريف المتغير بشكل صحيح
    let currentFontSize = parseInt(getCookie('fontSize')) || 16;
    document.body.style.fontSize = currentFontSize + "px";

    function changeFontSize(action) {
        if (action === 'increase' && currentFontSize < 24) {
            currentFontSize += 2;
        } else if (action === 'decrease' && currentFontSize > 12) {
            currentFontSize -= 2;
        }
        document.body.style.fontSize = currentFontSize + "px";
        setCookie('fontSize', currentFontSize, 7);
    }

    // --- ثالثاً: التحكم في الدارك مود ---
    let currentTheme = getCookie('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);

    function toggleTheme() {
        let theme = document.documentElement.getAttribute('data-theme');
        let newTheme = (theme === 'light') ? 'dark' : 'light';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        setCookie('theme', newTheme, 7);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('theme-icon');
        if (icon) {
            icon.innerText = (theme === 'light') ? '🌙' : '☀️';
        }
    }

    // انتظر تحميل الصفحة ثم طبق الإعدادات
    window.addEventListener('DOMContentLoaded', () => {
        updateThemeIcon(getCookie('theme') || 'light');
        // تأكدي من تطبيق الخط عند التحميل أيضاً
        document.body.style.fontSize = (getCookie('fontSize') || 16) + "px";
    });
    </script>
    
</body>
</html>
